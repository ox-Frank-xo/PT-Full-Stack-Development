<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Grid 6 - Assiggnment</title>
        <link rel="stylesheet" href="styles.css">
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Permanent+Marker&display=swap" rel="stylesheet">
    </head>
    <body>
        <div class="gridOne">
            <p>Hello World</p>
            <p style="color: blue;">My Fantastic Content</p>
        </div>
        <div class="gridTwo">
            <div class="child-one">
                <p>whatever</p>
            </div>
            <div class="child-two">
                <p>text</p>
            </div>
            <div class="child-three">
                <p>I want</p>
            </div>
        </div>
        <div class="gridThree">
            <div class="first-child">
                <p>The text I chose is Awesome</p>
            </div>
            <div class="second-child">
                <img src="images/nieve.jpg" alt="Nieve">
            </div>
        </div>
        <div class="gridFour">
            <div class="first-div">
                <p>My Even More Awesome Text</p>
            </div>
            <div id="second-div">
                <p>My left text</p>
                <p>My right text</p>
            </div>
        </div>
        <div class="gridFive">
            <div class="first-div-five">
                <p>My Even More Awesome Text</p>
            </div>
            <div class="second-div-five">
                <img src="images/nieve3.jpg" alt="nieve3">
                <img src="images/nieve2.jpg" alt="nieve2">
            </div>
        </div>
        <div class="gridSix">
            <div class="icon-container">
                <i class="fa-solid fa-star"></i>
            </div>
            <div class="text-container">
                <p>My awesome Google font is applied here</p>
            </div>
        </div>
    </body>
</html>
