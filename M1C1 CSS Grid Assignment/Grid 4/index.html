<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Grid 4 - Assiggnment</title>
        <link rel="stylesheet" href="styles.css">
    </head>
    <body>
        <div class="gridOne">
            <p>Hello World</p>
            <p style="color: blue;">My Fantastic Content</p>
        </div>
        <div class="gridTwo">
            <div class="child-one">
                <p>whatever</p>
            </div>
            <div class="child-two">
                <p>text</p>
            </div>
            <div class="child-three">
                <p>I want</p>
            </div>
        </div>
        <div class="gridThree">
            <div class="first-child">
                <p>The text I chose is Awesome</p>
            </div>
            <div class="second-child">
                <img src="images/nieve.jpg" alt="Nieve">
            </div>
        </div>
        <div class="gridFour">
            <div class="first-div">
                <p>My Even More Awesome Text</p>
            </div>
            <div id="second-div">
                <p>My left text</p>
                <p>My right text</p>
            </div>
        </div>
    </body>
</html>
